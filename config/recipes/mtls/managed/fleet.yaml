# ECK-managed mTLS: Elasticsearch + Kibana + Fleet Server + Fleet-managed Elastic Agent
#
# This recipe demonstrates ECK's built-in client certificate authentication with the full
# Fleet stack. The only change from a standard Fleet deployment is:
#   spec.http.tls.client.authentication: true
#
# ECK handles all certificate lifecycle including transitive client certificates for
# fleet-managed agents. Requires an enterprise license.
---
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
spec:
  version: 9.3.2
  http:
    tls:
      client:
        authentication: true
  nodeSets:
    - name: default
      count: 3
      config:
        node.store.allow_mmap: false
---
apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: kibana
spec:
  version: 9.3.2
  count: 1
  elasticsearchRef:
    name: elasticsearch
  config:
    # Define Fleet outputs explicitly so ECK can inject client certificate paths.
    # This is required for mTLS -- the default auto-generated output does not include
    # ssl.certificate/ssl.key.
    xpack.fleet.outputs:
      - id: eck-fleet-agent-output-elasticsearch
        is_default: true
        is_default_monitoring: true
        name: eck-elasticsearch
        type: elasticsearch
        hosts:
          - "https://elasticsearch-es-http.default.svc:9200"
    xpack.fleet.agents.fleet_server.hosts:
      - "https://fleet-server-agent-http.default.svc:8220"
    xpack.fleet.packages:
      - name: system
        version: latest
      - name: elastic_agent
        version: latest
      - name: fleet_server
        version: latest
    xpack.fleet.agentPolicies:
      - name: Fleet Server on ECK policy
        id: eck-fleet-server
        namespace: default
        monitoring_enabled:
          - logs
          - metrics
        unenroll_timeout: 900
        package_policies:
          - name: fleet_server-1
            id: fleet_server-1
            package:
              name: fleet_server
      - name: Elastic Agent on ECK policy
        id: eck-agent
        namespace: default
        monitoring_enabled:
          - logs
          - metrics
        unenroll_timeout: 900
        package_policies:
          - name: system-1
            id: system-1
            package:
              name: system
---
apiVersion: agent.k8s.elastic.co/v1alpha1
kind: Agent
metadata:
  name: fleet-server
spec:
  version: 9.3.2
  http:
    tls:
      client:
        authentication: true
  kibanaRef:
    name: kibana
  elasticsearchRefs:
    - outputName: default
      name: elasticsearch
  mode: fleet
  fleetServerEnabled: true
  policyID: eck-fleet-server
  deployment:
    replicas: 1
---
apiVersion: agent.k8s.elastic.co/v1alpha1
kind: Agent
metadata:
  name: elastic-agent
spec:
  version: 9.3.2
  kibanaRef:
    name: kibana
  fleetServerRef:
    name: fleet-server
  mode: fleet
  policyID: eck-agent
  daemonSet: {}

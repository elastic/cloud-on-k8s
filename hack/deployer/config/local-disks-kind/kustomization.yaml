# Kind: same as local-disks (non-AWS patch) plus smaller PVs for Kind/Docker Desktop.
resources:
  - ../local-disks
patches:
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: local-volume-provisioner
    path: kind-pv-size-patch.yaml
  - target:
      group: storage.k8s.io
      version: v1
      kind: StorageClass
      name: e2e-default
    path: kind-default-sc-patch.yaml

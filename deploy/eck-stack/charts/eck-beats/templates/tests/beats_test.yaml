suite: test beats
templates:
  - templates/beats.yaml
tests:
  - it: should render filebeat properly, when type and deployment is set
    release:
      name: quickstart
    set:
      spec:
        type: "filebeat"
        deployment: {}
    asserts:
      - isKind:
          of: Beat
      - equal:
          path: metadata.name
          value: quickstart-eck-beats
      - equal:
          path: spec.version
          value: 9.4.0
      - equal:
          path: spec.type
          value: filebeat
  - it: should render properly when using spec fields
    set:
      spec:
        daemonSet: {}
        elasticsearchRef:
          name: eck-elasticsearch
          namespace: default
        kibanaRef:
          name: eck-kibana
          namespace: default
        config:
          name: "filebeat"
        type: filebeat
        http:
          service:
            spec:
              type: ClusterIP
        monitoring:
          metrics:
            elasticsearchRefs:
            - name: monitoring
              namespace: observability
          logs:
            elasticsearchRefs:
            - name: monitoring
              namespace: observability
        secureSettings:
        - secretName: eck-beat-secret
        revisionHistoryLimit: 4
        serviceAccount:
          name: elastic-beat
    release:
      name: quickstart
    asserts:
      - isKind:
          of: Beat
      - equal:
          path: metadata.labels
          value:
            app.kubernetes.io/instance: quickstart
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: eck-beats
            helm.sh/chart: eck-beats-0.19.0
      - equal:
          path: spec
          value:
            version: 9.4.0
            daemonSet: {}
            elasticsearchRef:
              name: eck-elasticsearch
              namespace: default
            kibanaRef:
              name: eck-kibana
              namespace: default
            config:
              name: "filebeat"
            type: filebeat
            http:
              service:
                spec:
                  type: ClusterIP
            monitoring:
              metrics:
                elasticsearchRefs:
                - name: monitoring
                  namespace: observability
              logs:
                elasticsearchRefs:
                - name: monitoring
                  namespace: observability
            secureSettings:
            - secretName: eck-beat-secret
            revisionHistoryLimit: 4
            serviceAccountName: elastic-beat
  - it: should render properly when not using spec fields
    set:
      daemonSet: {}
      elasticsearchRef:
        name: eck-elasticsearch
        namespace: default
      kibanaRef:
        name: eck-kibana
        namespace: default
      config:
        name: "filebeat"
      type: filebeat
      http:
        service:
          spec:
            type: ClusterIP
      monitoring:
        metrics:
          elasticsearchRefs:
          - name: monitoring
            namespace: observability
        logs:
          elasticsearchRefs:
          - name: monitoring
            namespace: observability
      secureSettings:
      - secretName: eck-beat-secret
      revisionHistoryLimit: 4
      serviceAccount:
        name: elastic-beat
    release:
      name: quickstart
    asserts:
      - isKind:
          of: Beat
      - equal:
          path: metadata.labels
          value:
            app.kubernetes.io/instance: quickstart
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: eck-beats
            helm.sh/chart: eck-beats-0.19.0
      - equal:
          path: spec
          value:
            version: 9.4.0
            daemonSet: {}
            elasticsearchRef:
              name: eck-elasticsearch
              namespace: default
            kibanaRef:
              name: eck-kibana
              namespace: default
            config:
              name: "filebeat"
            type: filebeat
            http:
              service:
                spec:
                  type: ClusterIP
            monitoring:
              metrics:
                elasticsearchRefs:
                - name: monitoring
                  namespace: observability
              logs:
                elasticsearchRefs:
                - name: monitoring
                  namespace: observability
            secureSettings:
            - secretName: eck-beat-secret
            revisionHistoryLimit: 4
            serviceAccountName: elastic-beat
  - it: values.spec.image should render properly
    set:
      spec:
        type: filebeat
        deployment: {}
        image: my.registry.com/elastic/beats:9.4.0
    asserts:
      - equal:
          path: spec.image
          value: my.registry.com/elastic/beats:9.4.0
  - it: values.image should render properly
    set:
      type: filebeat
      deployment: {}
      image: my.registry.com/elastic/beats:9.4.0
    asserts:
      - equal:
          path: spec.image
          value: my.registry.com/elastic/beats:9.4.0
  - it: values.spec.image should take precedence over values.image
    set:
      spec:
        type: filebeat
        deployment: {}
        image: quay.io/elastic/beats:9.4.0
      image: my.registry.com/elastic/beats:9.4.0
    asserts:
      - equal:
          path: spec.image
          value: quay.io/elastic/beats:9.4.0
  - it: values.spec.image null should fallback to values.image
    set:
      spec:
        type: filebeat
        deployment: {}
        image: null
      image: my.registry.com/elastic/beats:9.4.0
    asserts:
      - equal:
          path: spec.image
          value: my.registry.com/elastic/beats:9.4.0
  - it: values.image with digest should render properly
    set:
      type: filebeat
      deployment: {}
      image: my.registry.com/elastic/beats:9.4.0@sha256:abc123
    asserts:
      - equal:
          path: spec.image
          value: my.registry.com/elastic/beats:9.4.0@sha256:abc123
  - it: values.image null should omit spec.image
    set:
      type: filebeat
      deployment: {}
      image: null
    asserts:
      - notExists:
          path: spec.image

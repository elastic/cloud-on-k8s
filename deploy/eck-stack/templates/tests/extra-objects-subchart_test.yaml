suite: test subchart extra objects passthrough
templates:
  - charts/eck-elasticsearch/templates/extra-objects.yaml
tests:
  - it: should render no extra objects for subchart by default
    asserts:
      - hasDocuments:
          count: 0
  - it: should render subchart extra objects when defined through umbrella values
    set:
      eck-elasticsearch.extraObjects:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: test-es-extra-cm
          data:
            key: es-value
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-es-extra-cm
  - it: should support helm templating with subchart named templates
    set:
      eck-elasticsearch.extraObjects:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: {{ include "elasticsearch.fullname" . }}-extra-config
            namespace: {{ .Release.Namespace }}
          data:
            key: value
    release:
      name: quickstart
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: elasticsearch-extra-config
  - it: should render subchart extra objects when defined as a map through umbrella values
    set:
      eck-elasticsearch.extraObjects:
        myConfigMap: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: test-es-extra-cm
          data:
            key: es-value
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-es-extra-cm
  - it: should support helm templating with subchart named templates when provided as a map
    set:
      eck-elasticsearch.extraObjects:
        myConfigMap: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: {{ include "elasticsearch.fullname" . }}-extra-config
            namespace: {{ .Release.Namespace }}
          data:
            key: value
    release:
      name: quickstart
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: elasticsearch-extra-config
  - it: should fail with descriptive error when subchart extraObjects is not a list or map
    set:
      eck-elasticsearch.extraObjects: "invalid"
    asserts:
      - failedTemplate:
          errorMessage: "extraObjects must be a list or map, got: string"

{{- if $.Values.eck_agent.enabled -}}
{{- include "elasticagent.deployment" $ -}}
{{- if $.Values.eck_agent.deployment.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: eck-agent-deployment
  namespace: {{ .namespace | default $.Release.Namespace | quote }}
  labels:
    {{- include "elasticagent.labels" $ | nindent 4 }}
  annotations:
    {{- with .Values.eck_agent.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
stringData:
  agent.yml: |-
    id: eck-agent-deployment
    secret_references: []
    agent:
      monitoring:
        namespace: {{ .Values.kubernetes.namespace }}
        use_output: default
        enabled: true
        logs: true
        metrics: true
    providers:
      kubernetes:
        hints.enabled: false
      kubernetes_leaderelection:
        enabled: false
    inputs:
    {{- range $configName := $.Values.eck_agent.deployment.enabled_configs }}
    {{- include (print $configName ".input") $ | nindent 6 }}
    {{- end}}
{{- end -}}
{{- end -}}